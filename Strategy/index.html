<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strategy by reks.dev</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="game-container"></div>

  <!-- Loading -->
  <div id="loading-screen">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <p>Loading game</p>
  </div>

  <!-- Country selection -->
  <div id="overlay-box">
    <span class="overlay-text">Choose your country</span>
  </div>

  <!-- HUD: Flag -->
  <div id="country-flag-box" class="game-panel">
    <img id="country-flag" src="" alt="Flag" />
  </div>

  <!-- HUD: Treasury -->
  <div id="money-box" class="game-panel">
    <img src="cdn/money-icon.png" alt="$" />
    <span id="money-amount">0</span>
  </div>

  <!-- Info panel -->
  <div id="info-container" class="game-panel">
    <img id="info-flag" src="" alt="" />
    <div id="info-name"></div>
    <div id="info-buttons"></div>
  </div>

  <!-- Bottom controls -->
  <div id="controls-bar">
    <button id="btn-recruit" class="game-btn game-btn-recruit">Recruit (R)</button>
    <button id="btn-move" class="game-btn game-btn-move">Move To (M)</button>
  </div>

  <!-- Slider -->
  <div id="slider-container" class="game-panel">
    <input type="range" id="slider" min="0" max="100" value="50" />
    <div class="slider-value">50</div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="collapseModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Event</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body"><p></p></div>
        <div class="modal-footer">
          <button type="button" class="btn" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/mapdata.js"></script>
  <script src="js/network.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/GameScene.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
